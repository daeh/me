#!/bin/zsh
# ~/.me.conf --- aliases and interactive-shell helpers for ORCD (Rocky 8.10+).
# Sourced from ~/.zshrc. Everything here is safe to live in `if [[ -o interactive ]]`
# but zsh sources this file only from .zshrc so that's implicit.

# --- Interactive-shell environment ---

# GPG pinentry needs to know which tty to prompt on. Safe here (not .zshenv)
# because sbatch non-interactive jobs don't source this file --- in those
# contexts $(tty) would emit 'not a tty'.
export GPG_TTY=$(tty)

# Keep secrets out of history. Only filters new entries --- existing
# .zsh_history is not retroactively scrubbed.
HISTORY_IGNORE='(bw *|*bw get*|*bw list*)'

# --- Command aliases ---

alias o="$ME_PREFIX/bin/rmate"
alias zshconfig="vim $HOME/.zshrc"
alias zreload="source $HOME/.zshrc"

# Safety variants alongside the uncompromised core commands --- use cpi/lni/mvi/rmi
# when you want the -i prompt. Does NOT shadow cp/ln/mv/rm.
alias cpi='nocorrect cp -i'
alias lni='nocorrect ln -i'
alias mvi='nocorrect mv -i'
alias rmi='nocorrect rm -i'

# --- Interactive helpers ---

mkcd() {
    emulate -L zsh
    setopt err_return
    if (( $# != 1 )); then
        print -u2 'Usage: mkcd <directory>'
        return 1
    fi
    local -r dir="$1"
    if [[ -e "$dir" ]]; then
        print -u2 "mkcd: '$dir' already exists"
        return 1
    fi
    mkdir -p "$dir" && cd "$dir"
}

# --- srun / Slurm aliases ---
#
# TODO(ORCD): partition names below were copied from openmind; update to
# whatever ORCD uses once you know the partition layout.
# ORCD partitions are documented at https://orcd-docs.mit.edu/ (search "partitions").
# Leaving `--partition=` unset lets Slurm pick the default.

alias interact="srun --cpus-per-task=6 --mem=25G --time=1-00:00:00 --pty zsh"
alias interactlong="srun --cpus-per-task=6 --mem=25G --time=2-00:00:00 --pty zsh"
alias interactmin="srun --mem=4G --time=0-4:00:00 --pty zsh"
alias interactmid="srun --cpus-per-task=10 --mem=60G --time=1-12:00:00 --pty zsh"
alias interactmax="srun --cpus-per-task=16 --mem=100G --time=1-12:00:00 --pty zsh"

alias ssque='squeue --me --format="%32i %20j %.9P %.2t %.10M %.10l %.7C %.7m %R"'
alias ssinfo='sinfo -N -o "%N, %c, %C, %e, %E, %G, %m, %T, %z"'
alias ssacctfin='sacct --format=jobid%20,jobname%30,ReqMem,maxrss,maxvmsize,maxpages,alloccpus,elapsed,exitcode,maxdiskread,maxdiskwrite,maxrssnode,state --units=G'

# --- Cluster-location aliases ---
#
# TODO(ORCD): ORCD home is /home/<user>, pool is /home/<user>/orcd/pool,
# scratch is /home/<user>/orcd/scratch. Add project-specific jumps here.

alias poolhome='cd "$HOME/orcd/pool"'
alias scratchhome='cd "$HOME/orcd/scratch"'

# --- TeX Live helper ---
# ORCD ships a module; prefer that. If you did `install_texlive.sh --full`,
# the source install's bin/ needs to be on PATH.

tb_latex() {
    if command -v tlmgr >/dev/null 2>&1; then
        printf 'tex-live already on PATH (%s)\n' "$(command -v tex)"
        return 0
    fi
    if command -v module >/dev/null 2>&1; then
        module load tex-live 2>/dev/null && return 0
    fi
    local _src="$ME_PREFIX/opt/texlive/bin/x86_64-linux"
    [[ -d "$_src" ]] && append_to_path_if_not_exists "$_src"
}

# --- Matlab helper (ORCD has matlab modules) ---

tb_matlab() {
    if command -v module >/dev/null 2>&1; then
        # Pick the newest available matlab; adjust the pin if needed.
        module load matlab/matlab-2024a 2>/dev/null || module load matlab 2>/dev/null
    fi
    alias matlabcl='matlab -nodesktop -nosplash -nodisplay -singleCompThread'
    alias matlabclgreedy='matlab -nodesktop -nosplash -nodisplay'
}
