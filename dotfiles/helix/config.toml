# ~/.config/helix/config.toml --- helix editor config.
# Reference: https://docs.helix-editor.com/configuration.html

theme = "base16_terminal"

[editor]
line-number = "relative"
mouse = true
bufferline = "multiple"
color-modes = true
cursorline = true
auto-save = false
auto-format = true
completion-trigger-len = 2
true-color = true

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false

[editor.indent-guides]
render = true
character = "┊"

[editor.statusline]
left = ["mode", "spinner", "file-name", "file-modification-indicator"]
center = []
right = ["diagnostics", "selections", "position", "file-encoding", "file-type"]

[keys.normal]
# Leader-ish niceties; feel free to rip out.
space.w = ":w"
space.q = ":q"

# Readline-style insert-mode bindings. Requires the terminal to forward Alt
# as the expected escape sequence; inside tmux, ensure `set -g xterm-keys on`
# or Alt-* arrives as bare ESC and gets eaten as "exit insert mode".
[keys.insert]
S-left = "extend_char_left"
S-right = "extend_char_right"
S-up = "extend_visual_line_up"
S-down = "extend_visual_line_down"
C-a = "goto_line_start"
C-e = "goto_line_end_newline"
C-u = "kill_to_line_start"
A-b = "move_prev_word_start"
A-f = "move_next_word_start"
S-A-left = "extend_prev_word_start"
S-A-right = "extend_next_word_start"
A-backspace = "delete_word_backward"
