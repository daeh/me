### template from https://www.youtube.com/watch?v=wpODsyBHxH0&t=33s

set-option -g default-shell $DEFAULT_TMUX_SHELL

### Look and feel ###
set-option -g status-position top
set -g default-terminal "${TERM}" ### "screen-256color"
set -sg terminal-overrides ",*:RGB"  # true color support

set -g escape-time 0  # disable delays on escape sequences # I don't type escape sequences manually, so I don't need the delay.

### enable mouse mode (tmux 2.1 and above) ###
set -g mouse on
# ( bind m set mouse )

set -g renumber-windows on  # keep numbering sequential #By default, after you delete a window tmux will remember the previous index of the other windows. Why? I dunno, but this gets rid of it.
set -g repeat-time 1000  # increase "prefix-free" window
set -g history-limit 20000 # increase scrollback history

### Options: start indexes from 1 ###
# by default, tmux starts windows and panes at 0, but that makes the most commonly used window (1) harder to reach with the keyboard. So, we change the base index to 1.
set -g base-index 1
set -g pane-base-index 1

### Change prefix ###
# by default, tmux uses C-b (Control + b) as the prefix key to send commands to tmux. other commonly used prefixes are C-a (Control + a). here, using backtick (`) as prefix
unbind C-b
set -g prefix `
bind ` send-prefix

# Theme: borders
# set -g pane-border-lines simple
set -g pane-border-style fg=grey,bright
set -g pane-active-border-style fg=magenta

# Theme: status
# set -g status-style bg=default,fg=black,bright
set -g status-style "bg=#A9A2A0,fg=black,bright"
set -g status-left ""
set -g status-right "#[fg=black,bright]#S"

# # Theme: status (windows) : v1 minimal, dots only
# set -g window-status-format "●"
# set -g window-status-current-format "●"
# set -g window-status-current-style "#{?window_zoomed_flag,fg=yellow,fg=magenta,nobold}"
# set -g window-status-bell-style "fg=red,nobold"

# Theme: status (windows) : v2 middimal
set -g window-status-format "● #[fg=black,bright]#I #[fg=black,bright]#W"
set -g window-status-current-format "#[fg=magenta,bright]#I #[fg=magenta,bright]#W"
set -g window-status-current-style "#{?window_zoomed_flag,bg=yellow,bg=magenta,nobold}"
set -g window-status-bell-style "bg=red,nobold"


### Keybindings ###
# unbind s ### Unbind default : session switch
unbind i ### Unbind default : session info
unbind l ### Unbind default : last window
unbind p ### Unbind default : previous window

bind h list-keys ### (help) Show all key bindings

bind f resize-pane -Z ### take pane fullscreen

bind l choose-tree -Zs  # Show sessions in tree format with zoom
bind e choose-window -Z
bind p last-window


bind q detach-client
# bind d detach-client ### default, also work

# bind i display-message    # Show status message
# bind i show-messages      # Show message history

### Keybinding: select pane ###
# bind w select-pane -U ### select pane up
# bind a select-pane -L ### select pane left
# bind s select-pane -D ### select pane down
# bind d select-pane -R ### select pane right

# Keybindings: disable repeat for arrows
bind Up select-pane -U
bind Left select-pane -L
bind Down select-pane -D
bind Right select-pane -R

### Keybindings: resize panes ###
# In tmux, bind -r creates a repeatable key binding. This means after you press the prefix key once, you can press the bound key multiple times without having to press the prefix again, as long as you do it within the repeat period.
# bind -r W resize-pane -U ### resize pane up
# bind -r A resize-pane -L ### resize pane left
# bind -r S resize-pane -D ### resize pane down
# bind -r D resize-pane -R ### resize pane right



# Keybindings: split
# bind h split-window -h
bind | split-window -h
# bind v split-window -v
# bind \ split-window -v
bind - split-window -v
bind _ split-window -v



